<html lang="en">

    <title>HTML Tables</title>
</head>
<body>

    <table>
        <thead>

        </thead>
        <tbody>



        </tbody>
    </table>

            </tr>
            <tr>
                <th>Unit 2</th>

            </tr>
            <tr>
                <th>Unit 3</th>
                <td>Cybersecurity</td>

            </tr>
            <tr>
                <th>SUNY Canton</th>

            </tr>
        </tbody>
    </table>
